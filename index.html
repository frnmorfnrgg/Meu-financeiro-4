<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance PRO ™$</title>
    <style>
        :root { 
            --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; 
            --purple: #a55eea; --red: #ff3e3e; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10001; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #111; padding: 30px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #222; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; outline: none; }
        
        .input-mask { -webkit-text-security: disc; text-security: disc; }
        .btn-auth { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--neon); color: #000; font-weight: bold; cursor: pointer; }

        #app-content { display: none; }
        .container { padding: 25px; max-width: 800px; margin: auto; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .label { color: #aaa; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .border-total { border-left: 6px solid var(--neon); }
        .border-video { border-left: 6px solid var(--red); }
        .border-invest { border-left: 6px solid var(--blue); }
        .border-equipe { border-left: 6px solid var(--purple); }
        
        .input-box { background: #1a1a1a; padding: 12px; border-radius: 15px; border: 1px solid #333; margin-bottom: 10px; }
        .input-box label { display: block; font-size: 0.65rem; color: #888; margin-bottom: 4px; }
        .input-box input { width: 100%; background: transparent; border: none; color: white; font-size: 1.1rem; outline: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        .btn-save { width: 100%; background: var(--neon); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .btn-reset { width: 100%; background: transparent; color: var(--red); border: 1px solid var(--red); padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 0.8rem; }
        
        #previa-box { background: rgba(0, 212, 255, 0.1); border: 1px dashed var(--blue); padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: center; display: none; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 0.65rem; font-weight: bold; }
        .nav-item.active { color: var(--neon); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color: var(--neon); margin-bottom: 20px;">Finance PRO</h1>
        <input type="text" id="auth-user" placeholder="ID de Usuário" required>
        <input type="text" id="auth-pass" class="input-mask" placeholder="Chave de Acesso" required>
        <button class="btn-auth" onclick="handleAuth()">ENTRAR NO PAINEL</button>
    </div>
</div>

<div id="app-content">
    <div class="container">
        <h2 style="text-align: center; color: #fff; font-size: 0.9rem;">Conta: <span id="user-display" style="color: var(--neon);"></span></h2>

        <div id="page-geral" class="page active">
            <div class="card border-total">
                <span class="label" style="color: var(--neon);">Saldo Total (Cofre)</span>
                <div style="font-size: 2.2rem; font-weight: 800;">R$ <span id="display-cofre">0,00</span></div>
                <button class="btn-reset" onclick="zerarSaldo()">ZERAR CONTA ATUAL</button>
            </div>

            <div class="row">
                <div class="card border-video">
                    <span class="label" style="color: var(--red);">Ganhos Vídeos</span>
                    <div style="font-size: 1.1rem;">R$ <span id="display-video-resumo">0,00</span></div>
                </div>
                <div class="card border-invest">
                    <span class="label" style="color: var(--blue);">Ganhos Invest.</span>
                    <div style="font-size: 1.1rem;">R$ <span id="display-invest-resumo">0,00</span></div>
                </div>
            </div>

            <div class="card border-equipe">
                <span class="label" style="color: var(--purple);">Membros na Rede</span>
                <div style="font-size: 1.8rem;"><span id="display-pessoas">0</span></div>
            </div>
            
            <button onclick="logout()" style="background:#222; color:#fff; border:none; padding:15px; border-radius:12px; width:100%; font-weight: bold;">Sair / Trocar Usuário</button>
        </div>

        <div id="page-invest" class="page">
            <div class="card border-invest">
                <span class="label">Simular Investimento</span>
                
                <div class="input-box">
                    <label>DATA DO INVESTIMENTO (Vazio = Hoje)</label>
                    <input type="date" id="v-data">
                </div>

                <div class="input-box"><label>VALOR A INVESTIR (R$)</label><input type="number" id="v-p" oninput="calcularPrevia()"></div>
                <div class="row">
                    <div class="input-box"><label>TAXA AO DIA (%)</label><input type="number" id="v-i" oninput="calcularPrevia()"></div>
                    <div class="input-box"><label>DURAÇÃO (DIAS)</label><input type="number" id="v-n" oninput="calcularPrevia()"></div>
                </div>

                <div id="previa-box">
                    <span class="label" style="color: var(--blue);">Prévia do Lucro</span>
                    <div id="previa-valor" style="font-size: 1.5rem; font-weight: bold; color: var(--neon);">R$ 0,00</div>
                    <small style="color: #888;">Retorno total: <span id="previa-total">R$ 0,00</span></small>
                </div>

                <button class="btn-save" style="background: var(--blue); color: white;" onclick="saveToCofre('invest')">CONFIRMAR INVESTIMENTO</button>
                
                <h3 style="font-size: 0.8rem; margin-top: 20px; color: var(--blue);">HISTÓRICO DE LUCROS:</h3>
                <div id="history-items"></div>
            </div>
        </div>

        <div id="page-videos" class="page">
            <div class="card border-video">
                <span class="label">Ganhos por Visualização</span>
                <div class="input-box"><label>QTD VÍDEOS</label><input type="number" id="vid-qtd"></div>
                <div class="input-box"><label>VALOR POR VÍDEO (R$)</label><input type="number" id="vid-val" step="0.01"></div>
                <button class="btn-save" style="background: var(--red); color: white;" onclick="saveToCofre('video')">ADICIONAR</button>
            </div>
        </div>

        <div id="page-equipe" class="page">
            <div class="card border-equipe">
                <span class="label">Minhas Equipes</span>
                <div class="input-box"><label>EQUIPE A</label><input type="number" id="q-a" oninput="update()"></div>
                <div class="input-box"><label>EQUIPE B</label><input type="number" id="q-b" oninput="update()"></div>
                <div class="input-box"><label>EQUIPE C</label><input type="number" id="q-c" oninput="update()"></div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('geral', this)">🏠<br>Geral</div>
        <div class="nav-item" onclick="tab('invest', this)">📊<br>Investir</div>
        <div class="nav-item" onclick="tab('videos', this)">🎬<br>Vídeos</div>
        <div class="nav-item" onclick="tab('equipe', this)">👥<br>Equipe</div>
    </nav>
</div>

<script>
    let currentUser = "";
    let cofreGeral = 0;
    let ganhoVideos = 0;
    let ganhoInvestimentosTotal = 0;
    let historicoInvest = [];

    function handleAuth() {
        const user = document.getElementById('auth-user').value.trim().toLowerCase();
        if(!user) { alert("Digite um ID"); return; }
        
        currentUser = user;
        localStorage.setItem('finance_session', user);
        document.getElementById('user-display').innerText = user.toUpperCase();
        
        cofreGeral = parseFloat(localStorage.getItem(user + '_cofre')) || 0;
        ganhoVideos = parseFloat(localStorage.getItem(user + '_videos')) || 0;
        ganhoInvestimentosTotal = parseFloat(localStorage.getItem(user + '_ganho_inv')) || 0;
        historicoInvest = JSON.parse(localStorage.getItem(user + '_history')) || [];
        
        document.getElementById('q-a').value = localStorage.getItem(user + '_qa') || 0;
        document.getElementById('q-b').value = localStorage.getItem(user + '_qb') || 0;
        document.getElementById('q-c').value = localStorage.getItem(user + '_qc') || 0;

        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        update();
        renderHistorico();
    }

    function calcularPrevia() {
        const p = parseFloat(document.getElementById('v-p').value) || 0;
        const tx = parseFloat(document.getElementById('v-i').value) || 0;
        const n = parseInt(document.getElementById('v-n').value) || 0;
        const box = document.getElementById('previa-box');

        if(p > 0 && tx > 0 && n > 0) {
            const lucro = p * (tx/100) * n;
            document.getElementById('previa-valor').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('previa-total').innerText = "R$ " + (p + lucro).toLocaleString('pt-BR', {minimumFractionDigits: 2});
            box.style.display = "block";
        } else {
            box.style.display = "none";
        }
    }

    function saveToCofre(tipo) {
        if (tipo === 'video') {
            const total = (parseFloat(document.getElementById('vid-qtd').value) || 0) * (parseFloat(document.getElementById('vid-val').value) || 0);
            cofreGeral += total; 
            ganhoVideos += total;
        } else if (tipo === 'invest') {
            const p = parseFloat(document.getElementById('v-p').value) || 0;
            const tx = parseFloat(document.getElementById('v-i').value) || 0;
            const n = parseInt(document.getElementById('v-n').value) || 0;
            const dataInput = document.getElementById('v-data').value;
            
            if(p > 0 && n > 0) {
                const lucro = p * (tx/100) * n;
                
                // Lógica de Data Escolhida ou Hoje
                let dataObjeto;
                if(dataInput) {
                    // Adiciona o horário para evitar erro de fuso horário
                    dataObjeto = new Date(dataInput + 'T12:00:00');
                } else {
                    dataObjeto = new Date();
                }
                
                const opcoes = { weekday: 'long', day: '2-digit', month: '2-digit' };
                const dataFormatada = dataObjeto.toLocaleDateString('pt-BR', opcoes);

                historicoInvest.unshift({ 
                    investido: p, 
                    lucro: lucro, 
                    data: dataFormatada 
                });
                
                cofreGeral += lucro;
                ganhoInvestimentosTotal += lucro;
                
                // Limpar campos
                document.getElementById('v-p').value = "";
                document.getElementById('v-n').value = "";
                document.getElementById('v-data').value = "";
                document.getElementById('previa-box').style.display = "none";
            }
        }
        update();
        renderHistorico();
    }

    function update() {
        const f = (v) => v.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        document.getElementById('display-cofre').innerText = f(cofreGeral);
        document.getElementById('display-video-resumo').innerText = f(ganhoVideos);
        document.getElementById('display-invest-resumo').innerText = f(ganhoInvestimentosTotal);
        
        const qA = parseInt(document.getElementById('q-a').value) || 0;
        const qB = parseInt(document.getElementById('q-b').value) || 0;
        const qC = parseInt(document.getElementById('q-c').value) || 0;
        document.getElementById('display-pessoas').innerText = qA + qB + qC;

        if(currentUser) {
            localStorage.setItem(currentUser + '_cofre', cofreGeral);
            localStorage.setItem(currentUser + '_videos', ganhoVideos);
            localStorage.setItem(currentUser + '_ganho_inv', ganhoInvestimentosTotal);
            localStorage.setItem(currentUser + '_history', JSON.stringify(historicoInvest));
            localStorage.setItem(currentUser + '_qa', qA);
            localStorage.setItem(currentUser + '_qb', qB);
            localStorage.setItem(currentUser + '_qc', qC);
        }
    }

    function renderHistorico() {
        const container = document.getElementById('history-items');
        container.innerHTML = historicoInvest.map((item, i) => `
            <div style="background:#1a1a1a; padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid #333">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <span style="font-size:0.7rem; color:#888; text-transform:capitalize;">${item.data}</span>
                    <span style="color:var(--neon); font-weight:bold;">+ R$ ${item.lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                </div>
                <div style="font-size:0.75rem; color:#555; margin-top:5px;">Investido: R$ ${item.investido.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
            </div>
        `).join('');
    }

    function zerarSaldo() {
        if(confirm("Deseja apagar os dados desta conta?")) {
            cofreGeral = 0; ganhoVideos = 0; ganhoInvestimentosTotal = 0; historicoInvest = [];
            update(); renderHistorico();
        }
    }

    function tab(id, el) {
        document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
    }

    function logout() {
        localStorage.removeItem('finance_session');
        location.reload();
    }

    window.onload = () => {
        const lastUser = localStorage.getItem('finance_session');
        if(lastUser) {
            document.getElementById('auth-user').value = lastUser;
            handleAuth();
        }
    }
</script>
</body>
</html>
