<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050505">
    
    <title>Finance PRO ™$</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; --purple: #a55eea; --red: #ff3e3e; --team-a: #ff5e57; --team-b: #ffdd59; --team-c: #0be881; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 100px; padding-top: env(safe-area-inset-top); }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .page { display: none; animation: fadeIn 0.2s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #222; }
        .label { color: #888; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .border-total { border-left: 5px solid var(--neon); }
        .border-video { border-left: 5px solid var(--red); }
        .border-invest { border-left: 5px solid var(--blue); }
        .border-equipe { border-left: 5px solid var(--purple); }

        .input-box { background: #1a1a1a; padding: 12px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .input-box label { display: block; font-size: 0.6rem; color: #888; margin-bottom: 5px; }
        .input-box input { width: 100%; background: transparent; border: none; color: white; font-size: 1.2rem; outline: none; font-weight: bold; }

        .btn-save { width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 0.9rem; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-save:active { transform: scale(0.98); opacity: 0.8; }

        .prediction { background: #001529; padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px solid var(--blue); font-size: 0.8rem; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #222; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 0.6rem; cursor: pointer; }
        .nav-item.active { color: var(--neon); }
    </style>
</head>
<body>

<div class="container">
    
    <div id="page-geral" class="page active">
        <div class="card border-total">
            <span class="label" style="color: var(--neon);">Saldo Acumulado (Cofre)</span>
            <div style="font-size: 2.2rem; font-weight: bold;">R$ <span id="display-cofre">0,00</span></div>
            <button class="btn-save" style="background: #333; color: white; padding: 8px; font-size: 0.7rem;" onclick="resetCofre()">Zerar Cofre Total</button>
        </div>

        <div class="row">
            <div class="card border-video">
                <span class="label" style="color: var(--red);">Ganhos Hoje</span>
                <div style="font-size: 1.2rem; font-weight: bold;">R$ <span id="display-video-resumo">0,00</span></div>
            </div>
            <div class="card border-invest">
                <span class="label" style="color: var(--blue);">Em Investimento</span>
                <div style="font-size: 1.2rem; font-weight: bold;">R$ <span id="display-invest-resumo">0,00</span></div>
            </div>
        </div>

        <div class="card border-equipe">
            <span class="label" style="color: var(--purple);">Pessoas na Rede</span>
            <div style="font-size: 1.8rem; font-weight: bold;"><span id="display-pessoas">0</span> <small style="font-size: 0.8rem; color: #555;">MEMBROS</small></div>
        </div>
    </div>

    <div id="page-videos" class="page">
        <div class="card border-video">
            <span class="label" style="color: var(--red);">Receita por Vídeos</span>
            <div class="input-box">
                <label>VÍDEOS ASSISTIDOS</label>
                <input type="number" id="vid-qtd" value="0" oninput="update()">
            </div>
            <div class="input-box">
                <label>VALOR POR VÍDEO (R$)</label>
                <input type="number" id="vid-val" value="0" step="0.01" oninput="update()">
            </div>
            <div style="text-align: center; margin: 10px 0; color: var(--red); font-weight: bold; font-size: 1.5rem;">
                + R$ <span id="vid-total-calc">0,00</span>
            </div>
            <button class="btn-save" style="background: var(--red); color: white;" onclick="saveToCofre('video')">Adicionar ao Saldo e Limpar</button>
        </div>
    </div>

    <div id="page-invest" class="page">
        <div class="card border-invest">
            <span class="label">Simulador e Previsão</span>
            <div class="input-box"><label>VALOR DO INVESTIMENTO</label><input type="number" id="v-p" value="0" oninput="update()"></div>
            <div class="row">
                <div class="input-box"><label>TAXA DIA (%)</label><input type="number" id="v-i" value="0" oninput="update()"></div>
                <div class="input-box"><label>PRAZO (DIAS)</label><input type="number" id="v-n" value="0" oninput="update()"></div>
            </div>

            <div class="prediction">
                <b>Finaliza em:</b><br>
                <span id="pred-data" style="color: var(--blue);">Selecione os dias</span>
            </div>

            <div style="text-align: center; margin: 15px 0;">
                <div id="res-total" style="font-size: 1.8rem; font-weight: bold;">R$ 0,00</div>
                <div id="res-lucro" style="color: var(--neon); font-size: 0.9rem; font-weight: bold;">Lucro: R$ 0,00</div>
            </div>
            <button class="btn-save" style="background: var(--blue); color: white;" onclick="saveToCofre('invest')">Confirmar Lucro no Saldo</button>
        </div>
    </div>

    <div id="page-equipe" class="page">
        <div class="card border-equipe">
            <span class="label">Gerenciar Membros</span>
            <div class="input-box" style="border-left: 4px solid var(--team-a);"><label>EQUIPE A</label><input type="number" id="q-a" value="0" oninput="update()"></div>
            <div class="input-box" style="border-left: 4px solid var(--team-b);"><label>EQUIPE B</label><input type="number" id="q-b" value="0" oninput="update()"></div>
            <div class="input-box" style="border-left: 4px solid var(--team-c);"><label>EQUIPE C</label><input type="number" id="q-c" value="0" oninput="update()"></div>
        </div>
    </div>

</div>

<nav class="nav">
    <div class="nav-item active" onclick="tab('geral', this)"><span>💰</span>GERAL</div>
    <div class="nav-item" onclick="tab('videos', this)"><span>🎬</span>VÍDEOS</div>
    <div class="nav-item" onclick="tab('invest', this)"><span>📊</span>INVESTIR</div>
    <div class="nav-item" onclick="tab('equipe', this)"><span>🤝</span>EQUIPES</div>
</nav>

<script>
    let cofre = parseFloat(localStorage.getItem('cofre_total')) || 0;

    function tab(id, el) {
        document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
    }

    function update() {
        const vQtd = parseFloat(document.getElementById('vid-qtd').value) || 0;
        const vVal = parseFloat(document.getElementById('vid-val').value) || 0;
        const totalVideo = vQtd * vVal;

        const p = parseFloat(document.getElementById('v-p').value) || 0;
        const i = parseFloat(document.getElementById('v-i').value) / 100 || 0;
        const n = parseInt(document.getElementById('v-n').value) || 0;
        const montante = p * (1 + (i * n));

        // Previsão de Dias
        if (n > 0) {
            const hoje = new Date();
            const futura = new Date();
            futura.setDate(hoje.getDate() + n);
            
            const diasSemana = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
            const dataFormatada = futura.toLocaleDateString('pt-BR');
            const diaNome = diasSemana[futura.getDay()];
            document.getElementById('pred-data').innerHTML = `${dataFormatada} (${diaNome})`;
        } else {
            document.getElementById('pred-data').innerText = "Informe o prazo";
        }

        const qa = parseInt(document.getElementById('q-a').value) || 0;
        const qb = parseInt(document.getElementById('q-b').value) || 0;
        const qc = parseInt(document.getElementById('q-c').value) || 0;

        const f = (v) => v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        
        document.getElementById('display-cofre').innerText = f(cofre);
        document.getElementById('vid-total-calc').innerText = f(totalVideo);
        document.getElementById('display-video-resumo').innerText = f(totalVideo);
        document.getElementById('display-invest-resumo').innerText = f(p);
        document.getElementById('display-pessoas').innerText = qa + qb + qc;
        document.getElementById('res-total').innerText = "R$ " + f(montante);
        document.getElementById('res-lucro').innerText = "Lucro: R$ " + f(montante - p);

        localStorage.setItem('fin_v_save', JSON.stringify({vQtd, vVal, p, vi:i*100, n, qa, qb, qc}));
    }

    function saveToCofre(tipo) {
        if (tipo === 'video') {
            const vQtd = parseFloat(document.getElementById('vid-qtd').value) || 0;
            const vVal = parseFloat(document.getElementById('vid-val').value) || 0;
            cofre += (vQtd * vVal);
            document.getElementById('vid-qtd').value = 0;
        } else if (tipo === 'invest') {
            const p = parseFloat(document.getElementById('v-p').value) || 0;
            const i = parseFloat(document.getElementById('v-i').value) / 100 || 0;
            const n = parseInt(document.getElementById('v-n').value) || 0;
            const lucro = (p * (1 + (i * n))) - p;
            cofre += lucro; // Salva apenas o lucro líquido no cofre
            document.getElementById('v-p').value = 0;
            document.getElementById('v-n').value = 0;
        }
        
        localStorage.setItem('cofre_total', cofre);
        update();
        alert("Valor salvo no Saldo Acumulado!");
    }

    function resetCofre() {
        if(confirm("Deseja zerar todo o seu Saldo Acumulado?")) {
            cofre = 0;
            localStorage.setItem('cofre_total', 0);
            update();
        }
    }

    window.onload = () => {
        const s = JSON.parse(localStorage.getItem('fin_v_save'));
        if(s) {
            document.getElementById('vid-qtd').value = s.vQtd;
            document.getElementById('vid-val').value = s.vVal;
            document.getElementById('v-p').value = s.p;
            document.getElementById('v-i').value = s.vi;
            document.getElementById('v-n').value = s.n;
            document.getElementById('q-a').value = s.qa;
            document.getElementById('q-b').value = s.qb;
            document.getElementById('q-c').value = s.qc;
        }
        update();
    }
</script>
</body>
    </html>
