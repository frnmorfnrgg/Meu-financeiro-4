<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance PRO ™$</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { 
            --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; 
            --purple: #a55eea; --red: #ff3e3e; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10001; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #111; padding: 30px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #222; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; outline: none; }
        .btn-auth { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--neon); color: #000; font-weight: bold; cursor: pointer; }

        #app-content { display: none; }
        .container { padding: 25px; max-width: 800px; margin: auto; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .label { color: #aaa; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .border-total { border-left: 6px solid var(--neon); }
        .border-video { border-left: 6px solid var(--red); }
        .border-invest { border-left: 6px solid var(--blue); }
        .border-equipe { border-left: 6px solid var(--purple); }
        
        .input-box { background: #1a1a1a; padding: 12px; border-radius: 15px; border: 1px solid #333; margin-bottom: 10px; }
        .input-box label { display: block; font-size: 0.65rem; color: #888; margin-bottom: 4px; }
        .input-box input { width: 100%; background: transparent; border: none; color: white; font-size: 1.1rem; outline: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        .btn-save { width: 100%; background: var(--neon); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .btn-reset { width: 100%; background: transparent; color: var(--red); border: 1px solid var(--red); padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 0.8rem; }
        
        .nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 0.65rem; font-weight: bold; }
        .nav-item.active { color: var(--neon); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color: var(--neon); margin-bottom: 20px;">Finance PRO</h1>
        <input type="text" id="auth-user" placeholder="Usuário" required>
        <input type="password" id="auth-pass" placeholder="Senha" required>
        <button class="btn-auth" id="btn-login" onclick="handleAuth()">ENTRAR / CRIAR</button>
    </div>
</div>

<div id="app-content">
    <div class="container">
        <h2 style="text-align: center; color: #444; font-size: 0.8rem;">CONTA: <span id="user-logged" style="color:var(--neon)">...</span></h2>

        <div id="page-geral" class="page active">
            <div class="card border-total">
                <span class="label" style="color: var(--neon);">Saldo Total (Cofre)</span>
                <div style="font-size: 2.2rem; font-weight: 800;">R$ <span id="display-cofre">0,00</span></div>
                <button class="btn-reset" onclick="zerarSaldo()">ZERAR TUDO</button>
            </div>

            <div class="row">
                <div class="card border-video">
                    <span class="label" style="color: var(--red);">Ganhos Vídeos</span>
                    <div style="font-size: 1.1rem;">R$ <span id="display-video-resumo">0,00</span></div>
                </div>
                <div class="card border-invest">
                    <span class="label" style="color: var(--blue);">Saldo Invest.</span>
                    <div style="font-size: 1.1rem;">R$ <span id="display-invest-resumo">0,00</span></div>
                </div>
            </div>

            <div class="card border-equipe">
                <span class="label" style="color: var(--purple);">Membros na Rede</span>
                <div style="font-size: 1.8rem;"><span id="display-pessoas">0</span></div>
            </div>
            
            <button onclick="logout()" style="background:#222; color:#fff; border:none; padding:15px; border-radius:12px; width:100%;">Sair da Conta</button>
        </div>

        <div id="page-invest" class="page">
            <div class="card border-invest">
                <span class="label">Novo Investimento</span>
                <div class="input-box"><label>DATA (Vazio = Hoje)</label><input type="date" id="v-data"></div>
                <div class="input-box"><label>VALOR INVESTIDO (R$)</label><input type="number" id="v-p" oninput="calcPreview()"></div>
                <div class="row">
                    <div class="input-box"><label>TAXA (%)</label><input type="number" id="v-i" oninput="calcPreview()"></div>
                    <div class="input-box"><label>DIAS</label><input type="number" id="v-n" oninput="calcPreview()"></div>
                </div>
                <div id="preview-box" style="display:none; background:rgba(0,212,255,0.1); padding:15px; border-radius:12px; margin-bottom:15px; border:1px dashed var(--blue); text-align:center;">
                    <div id="preview-lucro" style="font-size:1.5rem; font-weight:bold; color: var(--blue);">R$ 0,00</div>
                </div>
                <button class="btn-save" style="background: var(--blue); color: white;" onclick="saveToCloud('invest')">SALVAR NO BANCO</button>
                <div id="history-items" style="margin-top:20px;"></div>
            </div>
        </div>

        <div id="page-videos" class="page">
            <div class="card border-video">
                <span class="label">Ganhos Vídeos</span>
                <div class="input-box"><label>QTD VÍDEOS</label><input type="number" id="vid-qtd"></div>
                <div class="input-box"><label>VALOR POR VÍDEO (R$)</label><input type="number" id="vid-val" step="0.01"></div>
                <button class="btn-save" style="background: var(--red); color: white;" onclick="saveToCloud('video')">ADICIONAR AO COFRE</button>
            </div>
        </div>

        <div id="page-equipe" class="page">
            <div class="card border-equipe">
                <span class="label">Minha Equipe</span>
                <div class="input-box"><label>EQUIPE A</label><input type="number" id="q-a" value="0" oninput="saveEquipe()"></div>
                <div class="input-box"><label>EQUIPE B</label><input type="number" id="q-b" value="0" oninput="saveEquipe()"></div>
                <div class="input-box"><label>EQUIPE C</label><input type="number" id="q-c" value="0" oninput="saveEquipe()"></div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('geral', this)">🏠<br>Geral</div>
        <div class="nav-item" onclick="tab('invest', this)">📊<br>Investir</div>
        <div class="nav-item" onclick="tab('videos', this)">🎬<br>Vídeos</div>
        <div class="nav-item" onclick="tab('equipe', this)">👥<br>Equipe</div>
    </nav>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
        projectId: "SEU_PROJETO",
        storageBucket: "SEU_PROJETO.appspot.com",
        appId: "APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let userData = { cofre: 0, videos: 0, investimentos: [], equipe: {a:0, b:0, c:0} };

    async function handleAuth() {
        const user = document.getElementById('auth-user').value.trim().toLowerCase();
        const pass = document.getElementById('auth-pass').value.trim();
        if(!user || !pass) return alert("Preencha tudo!");

        const userRef = db.ref('usuarios/' + user);
        const snapshot = await userRef.once('value');
        const exists = snapshot.val();

        if(exists) {
            if(exists.senha === pass) {
                loginSuccess(user, exists.dados || userData);
            } else {
                alert("Senha incorreta para este usuário!");
            }
        } else {
            // Cria nova conta
            const newUser = { senha: pass, dados: userData };
            await userRef.set(newUser);
            loginSuccess(user, userData);
        }
    }

    function loginSuccess(username, data) {
        currentUser = username;
        userData = data;
        if(!userData.equipe) userData.equipe = {a:0, b:0, c:0};
        if(!userData.investimentos) userData.investimentos = [];
        
        document.getElementById('user-logged').innerText = username.toUpperCase();
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        
        // Carrega inputs da equipe
        document.getElementById('q-a').value = userData.equipe.a;
        document.getElementById('q-b').value = userData.equipe.b;
        document.getElementById('q-c').value = userData.equipe.c;
        
        updateUI();
    }

    function syncCloud() {
        if(currentUser) {
            db.ref('usuarios/' + currentUser + '/dados').set(userData);
        }
    }

    function saveToCloud(tipo) {
        if (tipo === 'video') {
            const total = (parseFloat(document.getElementById('vid-qtd').value) || 0) * (parseFloat(document.getElementById('vid-val').value) || 0);
            userData.cofre += total;
            userData.videos += total;
        } else if (tipo === 'invest') {
            const capital = parseFloat(document.getElementById('v-p').value) || 0;
            const tx = parseFloat(document.getElementById('v-i').value) || 0;
            const n = parseInt(document.getElementById('v-n').value) || 0;
            if(capital > 0 && n > 0) {
                const lucro = capital * (tx/100) * n;
                const dataIn = document.getElementById('v-data').value;
                let refDate = dataIn ? new Date(dataIn + 'T12:00:00') : new Date();
                
                let recDate = new Date(refDate);
                recDate.setDate(recDate.getDate() + n);

                userData.investimentos.push({
                    investido: capital,
                    lucro: lucro,
                    total: capital + lucro,
                    dataI: refDate.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}),
                    dataR: recDate.toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'2-digit'})
                });
                userData.cofre += lucro;
            }
        }
        syncCloud();
        updateUI();
    }

    function saveEquipe() {
        userData.equipe = {
            a: parseInt(document.getElementById('q-a').value) || 0,
            b: parseInt(document.getElementById('q-b').value) || 0,
            c: parseInt(document.getElementById('q-c').value) || 0
        };
        syncCloud();
        updateUI();
    }

    function updateUI() {
        const f = (v) => v.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        const totalInvestido = (userData.investimentos || []).reduce((acc, i) => acc + i.investido, 0);
        
        document.getElementById('display-cofre').innerText = f(userData.cofre);
        document.getElementById('display-video-resumo').innerText = f(userData.videos);
        document.getElementById('display-invest-resumo').innerText = f(totalInvestido);
        document.getElementById('display-pessoas').innerText = userData.equipe.a + userData.equipe.b + userData.equipe.c;

        const hist = document.getElementById('history-items');
        hist.innerHTML = (userData.investimentos || []).map((item, i) => `
            <div style="background:#1a1a1a; padding:12px; border-radius:15px; margin-bottom:10px; border:1px solid #333; position:relative;">
                <button onclick="removeInvest(${i})" style="position:absolute; right:12px; top:12px; background:none; border:none; color:var(--red);">X</button>
                <div style="color:var(--blue); font-weight:bold;">Investido: R$ ${item.investido.toFixed(2)}</div>
                <div style="font-size:0.85rem; color:var(--neon); margin-top:5px;">Recebe: ${item.dataR}</div>
                <small style="color:#555">Início: ${item.dataI} | Total: R$ ${item.total.toFixed(2)}</small>
            </div>
        `).join('');
    }

    function removeInvest(i) {
        userData.cofre -= userData.investimentos[i].lucro;
        userData.investimentos.splice(i, 1);
        syncCloud();
        updateUI();
    }

    function zerarSaldo() {
        if(confirm("Zerar todos os dados desta conta no banco de dados?")) {
            userData = { cofre: 0, videos: 0, investimentos: [], equipe: {a:0, b:0, c:0} };
            syncCloud();
            updateUI();
        }
    }

    function logout() { location.reload(); }

    function tab(id, el) {
        document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
    }

    function calcPreview() {
        const p = parseFloat(document.getElementById('v-p').value) || 0;
        const tx = parseFloat(document.getElementById('v-i').value) || 0;
        const n = parseInt(document.getElementById('v-n').value) || 0;
        if(p > 0 && tx > 0) {
            document.getElementById('preview-lucro').innerText = "R$ " + (p + (p * (tx/100) * n)).toFixed(2);
            document.getElementById('preview-box').style.display = 'block';
        } else { document.getElementById('preview-box').style.display = 'none'; }
    }
</script>
</body>
</html>
