<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance PRO ™$</title>
    <style>
        :root { 
            --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; 
            --purple: #a55eea; --red: #ff3e3e; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10001; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #111; padding: 30px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #222; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; outline: none; }
        
        .btn-auth { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--neon); color: #000; font-weight: bold; cursor: pointer; }

        #app-content { display: none; }
        .container { padding: 25px; max-width: 800px; margin: auto; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .label { color: #aaa; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .border-total { border-left: 6px solid var(--neon); }
        .border-video { border-left: 6px solid var(--red); }
        .border-invest { border-left: 6px solid var(--blue); }
        .border-equipe { border-left: 6px solid var(--purple); }
        
        .input-box { background: #1a1a1a; padding: 12px; border-radius: 15px; border: 1px solid #333; margin-bottom: 10px; }
        .input-box label { display: block; font-size: 0.65rem; color: #888; margin-bottom: 4px; }
        .input-box input { width: 100%; background: transparent; border: none; color: white; font-size: 1.1rem; outline: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        .btn-save { width: 100%; background: var(--neon); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .btn-reset { width: 100%; background: transparent; color: var(--red); border: 1px solid var(--red); padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 0.8rem; }
        
        #previa-box { background: rgba(0, 212, 255, 0.05); border: 1px dashed var(--blue); padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: center; display: none; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 0.65rem; font-weight: bold; }
        .nav-item.active { color: var(--neon); }
        
        .hist-item { background:#1a1a1a; padding:15px; border-radius:15px; margin-bottom:12px; border: 1px solid #333; }
        .data-info { font-size: 0.75rem; margin-bottom: 4px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color: var(--neon); margin-bottom: 20px;">Finance PRO</h1>
        <input type="text" id="auth-user" placeholder="ID de Usuário">
        <input type="password" id="auth-pass" placeholder="Senha">
        <button class="btn-auth" onclick="handleAuth()">ENTRAR</button>
    </div>
</div>

<div id="app-content">
    <div class="container">
        <h2 style="text-align: center; font-size: 0.8rem; color: #888;">CONTA: <span id="user-display" style="color: var(--neon);"></span></h2>

        <div id="page-geral" class="page active">
            <div class="card border-total">
                <span class="label" style="color: var(--neon);">Saldo Disponível (Lucros)</span>
                <div style="font-size: 2.2rem; font-weight: 800;">R$ <span id="display-cofre">0,00</span></div>
                <button class="btn-reset" onclick="zerarSaldo()">LIMPAR DADOS</button>
            </div>
            <div class="row">
                <div class="card border-video">
                    <span class="label" style="color: var(--red);">Ganhos Vídeos</span>
                    <div style="font-size: 1.1rem;">R$ <span id="display-video-resumo">0,00</span></div>
                </div>
                <div class="card border-invest">
                    <span class="label" style="color: var(--blue);">Capital Investido</span>
                    <div style="font-size: 1.1rem;">R$ <span id="display-invest-resumo">0,00</span></div>
                </div>
            </div>
            <div class="card border-equipe">
                <span class="label" style="color: var(--purple);">Equipe Total</span>
                <div style="font-size: 1.5rem;"><span id="display-pessoas">0</span> membros</div>
            </div>
            <button onclick="logout()" style="background:#222; color:#fff; border:none; padding:15px; border-radius:12px; width:100%; font-weight: bold;">SAIR / TROCAR CONTA</button>
        </div>

        <div id="page-invest" class="page">
            <div class="card border-invest">
                <span class="label">Novo Investimento</span>
                <div class="input-box"><label>DATA DE INÍCIO</label><input type="date" id="v-data"></div>
                <div class="input-box"><label>VALOR INVESTIDO (R$)</label><input type="number" id="v-p" oninput="calcularPrevia()"></div>
                <div class="row">
                    <div class="input-box"><label>TAXA (%)</label><input type="number" id="v-i" oninput="calcularPrevia()"></div>
                    <div class="input-box"><label>PRAZO (DIAS)</label><input type="number" id="v-n" oninput="calcularPrevia()" value="1"></div>
                </div>

                <div id="previa-box">
                    <div style="color: var(--blue); font-size: 0.7rem; margin-bottom: 5px;">PREVISÃO DE RETORNO:</div>
                    <div id="previa-data-saida" style="font-weight: bold; margin-bottom: 8px;">-</div>
                    <div style="font-size: 1.2rem; color: var(--neon); font-weight: bold;">+ R$ <span id="previa-lucro">0,00</span></div>
                </div>

                <button class="btn-save" style="background: var(--blue); color: white;" onclick="saveToCofre('invest')">REGISTRAR INVESTIMENTO</button>
                
                <h3 style="font-size: 0.75rem; margin-top: 25px; color: var(--blue);">HISTÓRICO DE MOVIMENTAÇÕES:</h3>
                <div id="history-items"></div>
            </div>
        </div>

        <div id="page-videos" class="page">
            <div class="card border-video">
                <span class="label">Ganhos Vídeos</span>
                <div class="input-box"><label>QUANTIDADE</label><input type="number" id="vid-qtd"></div>
                <div class="input-box"><label>VALOR UNIDADE</label><input type="number" id="vid-val" step="0.01"></div>
                <button class="btn-save" style="background: var(--red); color: white;" onclick="saveToCofre('video')">ADICIONAR</button>
            </div>
        </div>

        <div id="page-equipe" class="page">
            <div class="card border-equipe">
                <span class="label">Gerenciar Equipe</span>
                <div class="input-box"><label>EQUIPE A</label><input type="number" id="q-a" oninput="update()"></div>
                <div class="input-box"><label>EQUIPE B</label><input type="number" id="q-b" oninput="update()"></div>
                <div class="input-box"><label>EQUIPE C</label><input type="number" id="q-c" oninput="update()"></div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('geral', this)">🏠<br>Geral</div>
        <div class="nav-item" onclick="tab('invest', this)">📊<br>Investir</div>
        <div class="nav-item" onclick="tab('videos', this)">🎬<br>Vídeos</div>
        <div class="nav-item" onclick="tab('equipe', this)">👥<br>Equipe</div>
    </nav>
</div>

<script>
    let currentUser = "";
    let cofreGeral = 0; 
    let ganhoVideos = 0;
    let capitalInvestidoTotal = 0; 
    let historicoInvest = [];

    const formatarD = (data) => {
        const dias = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
        const d = data.getDate().toString().padStart(2, '0');
        const m = (data.getMonth() + 1).toString().padStart(2, '0');
        return `${d}/${m} (${dias[data.getDay()]})`;
    }

    function handleAuth() {
        const user = document.getElementById('auth-user').value.trim().toLowerCase();
        if(!user) return alert("Digite um ID");
        currentUser = user;
        localStorage.setItem('finance_session', user);
        document.getElementById('user-display').innerText = user.toUpperCase();
        
        cofreGeral = parseFloat(localStorage.getItem(user + '_cofre')) || 0;
        ganhoVideos = parseFloat(localStorage.getItem(user + '_videos')) || 0;
        capitalInvestidoTotal = parseFloat(localStorage.getItem(user + '_cap_inv')) || 0;
        historicoInvest = JSON.parse(localStorage.getItem(user + '_history')) || [];
        
        document.getElementById('q-a').value = localStorage.getItem(user + '_qa') || 0;
        document.getElementById('q-b').value = localStorage.getItem(user + '_qb') || 0;
        document.getElementById('q-c').value = localStorage.getItem(user + '_qc') || 0;

        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        update();
        renderHistorico();
    }

    function calcularPrevia() {
        const p = parseFloat(document.getElementById('v-p').value) || 0;
        const tx = parseFloat(document.getElementById('v-i').value) || 0;
        const n = parseInt(document.getElementById('v-n').value) || 1;
        const dataInput = document.getElementById('v-data').value;
        const box = document.getElementById('previa-box');

        if(p > 0 && tx > 0) {
            let dInic = dataInput ? new Date(dataInput + 'T12:00:00') : new Date();
            let dSair = new Date(dInic);
            dSair.setDate(dInic.getDate() + n);

            document.getElementById('previa-data-saida').innerText = formatarD(dSair);
            document.getElementById('previa-lucro').innerText = (p * (tx/100) * n).toLocaleString('pt-BR', {minimumFractionDigits: 2});
            box.style.display = "block";
        } else {
            box.style.display = "none";
        }
    }

    function saveToCofre(tipo) {
        if (tipo === 'video') {
            const v = (parseFloat(document.getElementById('vid-qtd').value) || 0) * (parseFloat(document.getElementById('vid-val').value) || 0);
            cofreGeral += v; ganhoVideos += v;
        } else if (tipo === 'invest') {
            const p = parseFloat(document.getElementById('v-p').value) || 0;
            const tx = parseFloat(document.getElementById('v-i').value) || 0;
            const n = parseInt(document.getElementById('v-n').value) || 1;
            if(p <= 0 || tx <= 0) return;

            let dInic = document.getElementById('v-data').value ? new Date(document.getElementById('v-data').value + 'T12:00:00') : new Date();
            let dSair = new Date(dInic);
            dSair.setDate(dInic.getDate() + n);

            const lucro = p * (tx/100) * n;
            historicoInvest.unshift({ 
                investido: p, lucro: lucro, 
                inicio: formatarD(dInic), sair: formatarD(dSair) 
            });
            capitalInvestidoTotal += p; cofreGeral += lucro;
            
            document.getElementById('v-p').value = "";
            document.getElementById('v-i').value = "";
            document.getElementById('v-data').value = "";
            document.getElementById('previa-box').style.display = "none";
        }
        update(); renderHistorico();
    }

    function update() {
        const f = (v) => v.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        document.getElementById('display-cofre').innerText = f(cofreGeral);
        document.getElementById('display-video-resumo').innerText = f(ganhoVideos);
        document.getElementById('display-invest-resumo').innerText = f(capitalInvestidoTotal);
        
        const qTot = (parseInt(document.getElementById('q-a').value) || 0) + (parseInt(document.getElementById('q-b').value) || 0) + (parseInt(document.getElementById('q-c').value) || 0);
        document.getElementById('display-pessoas').innerText = qTot;

        if(currentUser) {
            localStorage.setItem(currentUser + '_cofre', cofreGeral);
            localStorage.setItem(currentUser + '_videos', ganhoVideos);
            localStorage.setItem(currentUser + '_cap_inv', capitalInvestidoTotal);
            localStorage.setItem(currentUser + '_history', JSON.stringify(historicoInvest));
            localStorage.setItem(currentUser + '_qa', document.getElementById('q-a').value);
            localStorage.setItem(currentUser + '_qb', document.getElementById('q-b').value);
            localStorage.setItem(currentUser + '_qc', document.getElementById('q-c').value);
        }
    }

    function renderHistorico() {
        document.getElementById('history-items').innerHTML = historicoInvest.map(item => `
            <div class="hist-item">
                <div class="data-info" style="color:#888"><span>Entrada:</span> <b>${item.inicio}</b></div>
                <div class="data-info" style="color:var(--neon); margin-bottom:8px"><span>Liberação:</span> <b>${item.sair}</b></div>
                <div style="display:flex; justify-content:space-between; border-top:1px solid #222; padding-top:8px">
                    <span style="font-size:0.7rem; color:#666">Capital: R$ ${item.investido.toFixed(2)}</span>
                    <span style="color:var(--neon); font-weight:bold">+ R$ ${item.lucro.toFixed(2)}</span>
                </div>
            </div>
        `).join('');
    }

    function zerarSaldo() { if(confirm("Apagar tudo desta conta?")) { cofreGeral=0; ganhoVideos=0; capitalInvestidoTotal=0; historicoInvest=[]; update(); renderHistorico(); } }
    function tab(id, el) { document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active')); document.getElementById('page-'+id).classList.add('active'); el.classList.add('active'); }
    function logout() { localStorage.removeItem('finance_session'); location.reload(); }
    
    window.onload = () => { 
        const s = localStorage.getItem('finance_session'); 
        if(s) { document.getElementById('auth-user').value = s; handleAuth(); } 
    }
</script>
</body>
</html>
