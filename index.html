<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance PRO ™$ - Vídeos e Equipes</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; --purple: #a55eea; --orange: #ff9f43; --red: #ff3e3e; --team-a: #ff5e57; --team-b: #ffdd59; --team-c: #0be881; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 90px; }
        
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .page { display: none; animation: fadeIn 0.2s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #222; }
        .label { color: #888; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }
        
        .card-input { width: 100%; background: transparent; border: none; color: white; font-size: 1.6rem; font-weight: bold; outline: none; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* Bordas de Identificação */
        .border-total { border-left: 5px solid var(--neon); }
        .border-video { border-left: 5px solid var(--red); }
        .border-invest { border-left: 5px solid var(--blue); }
        .border-equipe { border-left: 5px solid var(--purple); }

        .input-box { background: #1a1a1a; padding: 12px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .input-box label { display: block; font-size: 0.6rem; color: #888; margin-bottom: 5px; }
        .input-box input { width: 100%; background: transparent; border: none; color: white; font-size: 1.2rem; outline: none; font-weight: bold; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 0.6rem; cursor: pointer; }
        .nav-item.active { color: var(--neon); }
        .nav-icon { font-size: 1.1rem; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="page-geral" class="page active">
        <div class="card border-total">
            <span class="label" style="color: var(--neon);">Dinheiro Total</span>
            <div style="font-size: 2.2rem; font-weight: bold;">R$ <span id="display-total">0,00</span></div>
        </div>

        <div class="row">
            <div class="card border-video">
                <span class="label" style="color: var(--red);">Ganhos Vídeos</span>
                <div style="font-size: 1.4rem; font-weight: bold; color: white;">R$ <span id="display-video-resumo">0,00</span></div>
            </div>
            <div class="card border-invest">
                <span class="label" style="color: var(--blue);">Investido</span>
                <div style="font-size: 1.4rem; font-weight: bold;">R$ <span id="display-invest-resumo">0,00</span></div>
            </div>
        </div>

        <div class="card border-equipe">
            <span class="label" style="color: var(--purple);">Pessoas na Rede</span>
            <div style="font-size: 1.8rem; font-weight: bold;"><span id="display-pessoas">0</span> <small style="font-size: 0.8rem; color: #555;">MEMBROS</small></div>
        </div>
    </div>

    <div id="page-videos" class="page">
        <div class="card border-video">
            <span class="label" style="color: var(--red);">Receita de Vídeos</span>
            <div class="input-box">
                <label>QUANTIDADE DE VÍDEOS</label>
                <input type="number" id="vid-qtd" value="0" oninput="update()">
            </div>
            <div class="input-box">
                <label>VALOR POR VÍDEO (R$)</label>
                <input type="number" id="vid-val" value="0.50" step="0.01" oninput="update()">
            </div>
            <div style="text-align: center; margin-top: 10px; color: var(--red); font-weight: bold;">
                Total Ganho: R$ <span id="vid-total-calc">0,00</span>
            </div>
        </div>
    </div>

    <div id="page-invest" class="page">
        <div class="card border-invest">
            <span class="label">Calculadora de Lucro</span>
            <div class="input-box"><label>VALOR INVESTIDO</label><input type="number" id="v-p" value="10" oninput="update()"></div>
            <div class="row">
                <div class="input-box"><label>TAXA (%)</label><input type="number" id="v-i" value="10" oninput="update()"></div>
                <div class="input-box"><label>DIAS</label><input type="number" id="v-n" value="1" oninput="update()"></div>
            </div>
        </div>
        <div class="card" style="border: 2px solid var(--neon); text-align: center;">
            <div id="res-total" style="font-size: 1.8rem; font-weight: bold;">R$ 11,00</div>
            <div id="res-lucro" style="color: var(--neon); font-size: 0.9rem;">Lucro: R$ 1,00</div>
        </div>
    </div>

    <div id="page-equipe" class="page">
        <div class="card">
            <span class="label">Pessoas Reais</span>
            <div class="input-box" style="border-left: 4px solid var(--team-a);"><label>EQUIPE A</label><input type="number" id="q-a" value="0" oninput="update()"></div>
            <div class="input-box" style="border-left: 4px solid var(--team-b);"><label>EQUIPE B</label><input type="number" id="q-b" value="0" oninput="update()"></div>
            <div class="input-box" style="border-left: 4px solid var(--team-c);"><label>EQUIPE C</label><input type="number" id="q-c" value="0" oninput="update()"></div>
        </div>
    </div>

</div>

<nav class="nav">
    <div class="nav-item active" onclick="tab('geral', this)"><span class="nav-icon">💰</span><span>GERAL</span></div>
    <div class="nav-item" onclick="tab('videos', this)"><span class="nav-icon">🎬</span><span>VÍDEOS</span></div>
    <div class="nav-item" onclick="tab('invest', this)"><span class="nav-icon">📊</span><span>INVESTIR</span></div>
    <div class="nav-item" onclick="tab('equipe', this)"><span class="nav-icon">🤝</span><span>EQUIPES</span></div>
</nav>

<script>
    function tab(id, el) {
        document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
    }

    function update() {
        // Dados Vídeos
        const vQtd = parseFloat(document.getElementById('vid-qtd').value) || 0;
        const vVal = parseFloat(document.getElementById('vid-val').value) || 0;
        const totalVideo = vQtd * vVal;

        // Dados Investimento
        const p = parseFloat(document.getElementById('v-p').value) || 0;
        const i = parseFloat(document.getElementById('v-i').value) / 100 || 0;
        const n = parseInt(document.getElementById('v-n').value) || 0;
        const montante = p * (1 + (i * n));

        // Dados Equipe
        const qa = parseInt(document.getElementById('q-a').value) || 0;
        const qb = parseInt(document.getElementById('q-b').value) || 0;
        const qc = parseInt(document.getElementById('q-c').value) || 0;

        const totalPessoas = qa + qb + qc;
        const dinheiroTotal = totalVideo + p;

        const f = (v) => v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        
        // Atualizar Telas
        document.getElementById('vid-total-calc').innerText = f(totalVideo);
        document.getElementById('display-video-resumo').innerText = f(totalVideo);
        document.getElementById('display-invest-resumo').innerText = f(p);
        document.getElementById('display-total').innerText = f(dinheiroTotal);
        document.getElementById('display-pessoas').innerText = totalPessoas;
        document.getElementById('res-total').innerText = "R$ " + f(montante);
        document.getElementById('res-lucro').innerText = "Lucro: R$ " + f(montante - p);

        // Salvar
        localStorage.setItem('fin_v13', JSON.stringify({vQtd, vVal, p, i:i*100, n, qa, qb, qc}));
    }

    window.onload = () => {
        const s = JSON.parse(localStorage.getItem('fin_v13'));
        if(s) {
            document.getElementById('vid-qtd').value = s.vQtd;
            document.getElementById('vid-val').value = s.vVal;
            document.getElementById('v-p').value = s.p;
            document.getElementById('v-i').value = s.i;
            document.getElementById('v-n').value = s.n;
            document.getElementById('q-a').value = s.qa;
            document.getElementById('q-b').value = s.qb;
            document.getElementById('q-c').value = s.qc;
        }
        update();
    }
</script>
</body>
</html>
