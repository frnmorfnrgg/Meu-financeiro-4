<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050505">
    <title>Finance PRO ™$</title>
    <style>
        :root { 
            --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; 
            --purple: #a55eea; --red: #ff3e3e; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10001; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: #111; padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 380px;
            text-align: center; border: 1px solid #222;
        }
        .auth-card input {
            width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px;
            border: 1px solid #333; background: #000; color: white; outline: none; font-size: 1.1rem;
        }
        .btn-auth {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            background: var(--neon); color: #000; font-weight: bold; cursor: pointer; font-size: 1rem;
        }

        #app-content { display: none; }
        .container { padding: 25px; max-width: 800px; margin: auto; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 24px; padding: 25px; margin-bottom: 20px; border: 1px solid #222; }
        .label { color: #aaa; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 12px; display: block; font-weight: bold; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .border-total { border-left: 8px solid var(--neon); }
        .border-video { border-left: 8px solid var(--red); }
        .border-invest { border-left: 8px solid var(--blue); }
        .border-equipe { border-left: 8px solid var(--purple); }
        
        .input-box { background: #1a1a1a; padding: 15px; border-radius: 16px; border: 1px solid #333; margin-bottom: 15px; }
        .input-box label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 8px; }
        .input-box input { width: 100%; background: transparent; border: none; color: white; font-size: 1.4rem; outline: none; }
        
        .btn-save { width: 100%; background: var(--neon); color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        .history-item { background: #1a1a1a; padding: 18px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #333; position: relative; }
        .btn-del { position: absolute; right: 15px; top: 15px; background: #331111; border: none; color: var(--red); padding: 8px; border-radius: 8px; font-weight: bold; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 0.7rem; font-weight: bold; }
        .nav-item span { font-size: 1.5rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--neon); }

        #nav-admin, #card-visitas { display: none; }
        .user-badge { background: #111; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--neon); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color: var(--neon); margin: 0;">Finance PRO</h1>
        <input type="text" id="auth-user" placeholder="Usuário">
        <button class="btn-auth" onclick="handleAuth()">ENTRAR</button>
    </div>
</div>

<div id="app-content">
    <div class="container">
        <h2 style="text-align: center; color: #333; font-size: 1rem;">Finance PRO ™<span id="secret-trigger">$</span></h2>

        <div id="page-geral" class="page active">
            <div class="card border-total">
                <span class="label" style="color: var(--neon);">Saldo Total (Cofre)</span>
                <div style="font-size: 2.8rem; font-weight: 800;">R$ <span id="display-cofre">0,00</span></div>
            </div>

            <div class="row">
                <div class="card border-video">
                    <span class="label" style="color: var(--red);">Ganhos Vídeos</span>
                    <div style="font-size: 1.3rem;">R$ <span id="display-video-resumo">0,00</span></div>
                </div>
                <div class="card border-invest">
                    <span class="label" style="color: var(--blue);">Lucro Inv.</span>
                    <div style="font-size: 1.3rem;">R$ <span id="display-invest-resumo">0,00</span></div>
                </div>
            </div>

            <div class="card border-equipe">
                <span class="label" style="color: var(--purple);">Membros na Rede</span>
                <div style="font-size: 2rem;"><span id="display-pessoas">0</span></div>
            </div>

            <div class="card" id="card-visitas" style="border-left: 8px solid #f39c12;">
                <span class="label">Contador de Acessos</span>
                <img src="https://hcount.com/count/financepro/bg_000000/txt_ffffff/border_000000/columns_1/font_arial/size_25/index.png">
            </div>
            
            <button onclick="logout()" style="background:#222; color:#fff; border:none; padding:15px; border-radius:12px; width:100%; margin-top:10px;">Sair da Conta</button>
        </div>

        <div id="page-invest" class="page">
            <div class="card border-invest">
                <span class="label">Simular Investimento</span>
                <div class="input-box"><label>DATA DA APLICAÇÃO</label><input type="date" id="inv-data"></div>
                <div class="input-box"><label>VALOR APLICADO (R$)</label><input type="number" id="v-p" oninput="calcPreview()"></div>
                <div class="row">
                    <div class="input-box"><label>TAXA (%)</label><input type="number" id="v-i" oninput="calcPreview()"></div>
                    <div class="input-box"><label>DIAS</label><input type="number" id="v-n" oninput="calcPreview()"></div>
                </div>
                <div id="preview-box" style="display:none; background:rgba(0,255,136,0.1); padding:15px; border-radius:12px; margin-bottom:15px; border:1px dashed var(--neon); text-align:center;">
                    <div id="preview-lucro" style="font-size:1.5rem; font-weight:bold;">R$ 0,00</div>
                </div>
                <button class="btn-save" style="background: var(--blue); color: white;" onclick="saveToCofre('invest')">APLICAR INVESTIMENTO</button>
                <div id="history-items" style="margin-top:20px;"></div>
            </div>
        </div>

        <div id="page-videos" class="page">
            <div class="card border-video">
                <span class="label">Ganhos por Visualização</span>
                <div class="input-box"><label>QTD VÍDEOS ASSISTIDOS</label><input type="number" id="vid-qtd"></div>
                <div class="input-box"><label>VALOR POR CADA VÍDEO (R$)</label><input type="number" id="vid-val" step="0.01"></div>
                <button class="btn-save" style="background: var(--red); color: white;" onclick="saveToCofre('video')">ADICIONAR AO COFRE</button>
            </div>
        </div>

        <div id="page-equipe" class="page">
            <div class="card border-equipe">
                <span class="label">Gerenciar Minha Rede</span>
                <div class="input-box"><label>MEMBROS EQUIPE A</label><input type="number" id="q-a" oninput="update()"></div>
                <div class="input-box"><label>MEMBROS EQUIPE B</label><input type="number" id="q-b" oninput="update()"></div>
                <div class="input-box"><label>MEMBROS EQUIPE C</label><input type="number" id="q-c" oninput="update()"></div>
            </div>
        </div>

        <div id="page-admin" class="page">
            <div class="card">
                <h3 style="color: #f39c12; margin-top:0">Usuários Registrados</h3>
                <div id="user-list"></div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('geral', this)"><span>🏠</span>Geral</div>
        <div class="nav-item" onclick="tab('invest', this)"><span>📊</span>Investir</div>
        <div class="nav-item" onclick="tab('videos', this)"><span>🎬</span>Vídeos</div>
        <div class="nav-item" onclick="tab('equipe', this)"><span>👥</span>Equipe</div>
        <div id="nav-admin" class="nav-item" onclick="tab('admin', this)"><span>🔑</span>Admin</div>
    </nav>
</div>

<script>
    let cofre = parseFloat(localStorage.getItem('cofre_total')) || 0;
    let ganhoVideosTotal = parseFloat(localStorage.getItem('ganho_videos')) || 0;
    let historicoInvest = JSON.parse(localStorage.getItem('historico_invest')) || [];

    function handleAuth() {
        const user = document.getElementById('auth-user').value.trim();
        if (!user) return;
        localStorage.setItem('currentUser', user);
        let allUsers = JSON.parse(localStorage.getItem('all_registered_users')) || [];
        if (!allUsers.includes(user)) { allUsers.push(user); localStorage.setItem('all_registered_users', JSON.stringify(allUsers)); }
        unlockApp();
    }

    function unlockApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        update(); renderHistorico(); updateAdminList();
    }

    function logout() { localStorage.removeItem('currentUser'); location.reload(); }

    function tab(id, el) {
        document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
    }

    function calcPreview() {
        const p = parseFloat(document.getElementById('v-p').value) || 0;
        const tx = parseFloat(document.getElementById('v-i').value) || 0;
        const n = parseInt(document.getElementById('v-n').value) || 0;
        const box = document.getElementById('preview-box');
        if (p > 0 && tx > 0 && n > 0) {
            const lucro = p * (tx/100) * n;
            document.getElementById('preview-lucro').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits:2});
            box.style.display = 'block';
        } else { box.style.display = 'none'; }
    }

    function saveToCofre(tipo) {
        if (tipo === 'video') {
            const qtd = parseFloat(document.getElementById('vid-qtd').value) || 0;
            const val = parseFloat(document.getElementById('vid-val').value) || 0;
            const total = qtd * val;
            if(total > 0) {
                cofre += total;
                ganhoVideosTotal += total;
                localStorage.setItem('ganho_videos', ganhoVideosTotal);
                document.getElementById('vid-qtd').value = "";
            }
        } else if (tipo === 'invest') {
            const p = parseFloat(document.getElementById('v-p').value) || 0;
            const tx = parseFloat(document.getElementById('v-i').value) || 0;
            const n = parseInt(document.getElementById('v-n').value) || 0;
            const dt = document.getElementById('inv-data').value;
            if(p > 0 && dt && n > 0) {
                const lucro = p * (tx/100) * n;
                const dRec = new Date(dt + 'T12:00:00');
                dRec.setDate(dRec.getDate() + n);
                historicoInvest.push({
                    valor: p, lucro: lucro, 
                    vencimento: dRec.toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'2-digit'}),
                    dias: n
                });
                cofre += lucro;
                document.getElementById('v-p').value = ""; document.getElementById('v-i').value = ""; document.getElementById('v-n').value = "";
            }
        }
        localStorage.setItem('cofre_total', cofre);
        localStorage.setItem('historico_invest', JSON.stringify(historicoInvest));
        update(); renderHistorico();
    }

    function renderHistorico() {
        const container = document.getElementById('history-items');
        if(!container) return;
        container.innerHTML = "";
        historicoInvest.forEach((item, i) => {
            container.innerHTML += `<div class="history-item">
                <button class="btn-del" onclick="removeInvest(${i})">X</button>
                <div style="font-size:1.1rem; font-weight:bold; color:var(--neon)">+ R$ ${item.lucro.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
                <small>Recebimento: ${item.vencimento} (${item.dias} dias)</small>
            </div>`;
        });
    }

    function removeInvest(i) {
        cofre -= historicoInvest[i].lucro;
        historicoInvest.splice(i, 1);
        localStorage.setItem('cofre_total', cofre);
        localStorage.setItem('historico_invest', JSON.stringify(historicoInvest));
        update(); renderHistorico();
    }

    function update() {
        const f = (v) => v.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        document.getElementById('display-cofre').innerText = f(cofre);
        document.getElementById('display-video-resumo').innerText = f(ganhoVideosTotal);
        const invLucro = historicoInvest.reduce((acc, i) => acc + i.lucro, 0);
        document.getElementById('display-invest-resumo').innerText = f(invLucro);
        
        const qA = parseInt(document.getElementById('q-a').value) || 0;
        const qB = parseInt(document.getElementById('q-b').value) || 0;
        const qC = parseInt(document.getElementById('q-c').value) || 0;
        document.getElementById('display-pessoas').innerText = qA + qB + qC;
    }

    function updateAdminList() {
        const users = JSON.parse(localStorage.getItem('all_registered_users')) || [];
        const list = document.getElementById('user-list');
        if(list) list.innerHTML = [...new Set(users)].map(u => `<div class="user-badge"><span>${u}</span><small>Ativo</small></div>`).join('');
    }

    let clicks = 0;
    document.getElementById('secret-trigger').onclick = () => {
        clicks++; if(clicks >= 5) { 
            document.getElementById('nav-admin').style.display = 'flex'; 
            document.getElementById('card-visitas').style.display = 'block';
        }
    };

    window.onload = () => {
        document.getElementById('inv-data').value = new Date().toISOString().split('T')[0];
        // Verifica se existe um usuário salvo e pula a tela de login
        if (localStorage.getItem('currentUser')) {
            unlockApp();
        }
    }
</script>
</body>
</html>
